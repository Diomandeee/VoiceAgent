name: VoiceAgent
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5"
    TARGETED_DEVICE_FAMILY: "1"

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.17.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  OpenClawKit:
    url: https://github.com/Diomandeee/OpenClawKit
    from: "1.0.0"

targets:
  VoiceAgent:
    type: application
    platform: iOS
    sources:
      - path: VoiceAgent
    resources:
      - path: VoiceAgent/Assets.xcassets
    dependencies:
      - package: ComposableArchitecture
      - package: Supabase
      - package: OpenClawKit
        product: OpenClawCore
      - package: OpenClawKit
        product: OpenClawSupabase
      - package: OpenClawKit
        product: OpenClawTCA
    info:
      path: VoiceAgent/Info.plist
      properties:
        CFBundleDisplayName: "Voice Agent"
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSMicrophoneUsageDescription: "Voice Agent uses your microphone for voice commands to the agent mesh."
        NSSpeechRecognitionUsageDescription: "Voice Agent uses speech recognition for voice commands."
        NSCameraUsageDescription: "Voice Agent uses your camera for visual queries in Direct Voice mode."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.voiceagent
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "8643C988C4"
    developmentTeam: "8643C988C4"

  VoiceAgentTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VoiceAgentTests
    dependencies:
      - target: VoiceAgent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.voiceagent.tests
